{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto ">
        <h4>Listes des Gpios</h4>
        <table class="table bg-light">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Mode</th>
                    <th>Valeur</th>
                    <th>Appareil</th>
                    <th>Info</th>
                    <th>Value</th>
                </tr>
            </thead>
            <tbody>{% for gpio in gpio_list %}
                <tr>
                    <td>{{gpio.nom}}</td>
                    <td>{{gpio.mode}}</td>
                    <td>{{ gpio.valeur}}</td>
                    <td>{{ gpio.appareil.nom}}</td>
                    <td>{{ gpio.info}}</td>
                    <td class="mx-auto text-center">{% if gpio.mode=='input'%}<input class="form-control mx-auto " style="width: 5rem;" type="text" id="gpio_{{gpio.id}}">{% else %}<button class="btn btn-success btn-sm">Test</button>{% endif %}</td>

                </tr>{% endfor %}
            </tbody>
        </table>
    </div>
</div>




{% endblock %}
